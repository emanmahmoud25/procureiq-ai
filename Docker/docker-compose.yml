version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: procurement_db
    restart: always
    environment:
      POSTGRES_USER: procurement
      POSTGRES_PASSWORD: procurement123
      POSTGRES_DB: procurement_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - procurement_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: procurement_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - procurement_net

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: procurement_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://procurement:procurement123@db:5432/procurement_db
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - db
    volumes:
      - ../runs:/app/runs
    networks:
      - procurement_net

networks:
  procurement_net:
    driver: bridge

volumes:
  postgres_data: